version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: linkprofile
      POSTGRES_USER: linkprofile
      POSTGRES_PASSWORD: linkprofile
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkprofile"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
